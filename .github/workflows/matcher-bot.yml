name: Matcher Integration Bot

on:
  issues:
    types: [labeled]

jobs:
  integrate:
    if: github.event.label.name == 'new-matcher'
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Setup workspace (incremental checkout from cache)
        run: |
          CACHE="$HOME/actions-runner/_cache/imcui"
          GH_REPO="https://github.com/Vincentqyw/image-matching-webui.git"

          if [ -d "$CACHE/.git" ]; then
            # Cache exists — incremental update
            echo "Using cached repo, fetching latest..."
            cd "$CACHE"
            git fetch origin main --depth=1
            git reset --hard origin/main
            # Only update submodules if .gitmodules changed
            if ! git diff --quiet HEAD~1 -- .gitmodules 2>/dev/null; then
              echo "Submodules changed, updating..."
              git submodule update --init --recursive --depth=1 --jobs=8
            fi
          else
            # First run — full clone
            echo "First run, cloning repo..."
            mkdir -p "$(dirname "$CACHE")"
            git clone --depth=1 --recurse-submodules --shallow-submodules --jobs=8 \
              "$GH_REPO" "$CACHE"
          fi

          # Fix permissions (git pack files may be read-only)
          chmod -R u+rw "$CACHE" 2>/dev/null || true

          # Copy to workspace (rsync handles permissions cleanly)
          rm -rf "$GITHUB_WORKSPACE"/*
          rsync -a --no-perms "$CACHE"/ "$GITHUB_WORKSPACE"/
          echo "Workspace ready: $GITHUB_WORKSPACE"

      - name: Extract repo URL from issue
        id: extract
        run: |
          ISSUE_BODY=$(cat << 'EOF'
          ${{ github.event.issue.body }}
          EOF
          )
          # macOS-compatible: use perl instead of grep -P
          REPO_URL=$(echo "$ISSUE_BODY" | perl -ne 'print "$1" if m{(https://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)}' | head -1 | tr -d '\n\r')
          REPO_NAME=$(basename "$REPO_URL" .git 2>/dev/null)

          if [ -z "$REPO_URL" ]; then
            echo "❌ No GitHub repository URL found in issue body."
            echo "Expected format: https://github.com/owner/repo"
            exit 1
          fi

          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Extracted: $REPO_URL"

      - name: Run matcher integration
        env:
          FORCE_COLOR: "1"
          NODE_OPTIONS: "--no-warnings"
        run: |
          echo "Integrating: ${{ steps.extract.outputs.repo_name }}"
          echo "From: ${{ steps.extract.outputs.repo_url }}"
          # Use script to force line-buffered output in GitHub Actions
          script -q /dev/null claude --print "/integrate-matcher ${{ steps.extract.outputs.repo_url }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="${{ steps.extract.outputs.repo_name }}"
          REPO_URL="${{ steps.extract.outputs.repo_url }}"

          git config user.name "matcher-bot"
          git config user.email "bot@vincentqyw.dev"

          BRANCH="feat/add-${NAME}-$(date +%s)"
          git checkout -b "$BRANCH"
          git add .

          if git diff --cached --quiet; then
            echo "❌ No changes detected after integration. The skill may have failed to produce output."
            exit 1
          fi

          git commit -m "feat: integrate $NAME


          Source: $REPO_URL"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat: integrate $NAME" \
            --body "Auto-integrated from #${{ github.event.issue.number }}.

          Source: $REPO_URL"

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Integration complete! PR has been created for review.'
            })
            github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'new-matcher'
            })

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Integration failed. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })
