# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
    # You can also specify other tools here if needed

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py
  # If your Sphinx configuration is not located in docs/conf.py, adjust the path below

# Optionally declare the Python requirements required to build your docs
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

# If using Git submodules, uncomment and configure the following line:
# submodules:
#   include: all

# Set the version of the OS and Python, and the tools to use
# Build formats
formats:
  - pdf
  - htmlzip
  - epub

# Python search paths for autodoc
# These are added to sys.path when building docs
# python:
#   sys_path:
#     - .
